site_name: Wei-Cheng Chiu
site_url: https://wayne.is-a.dev/
site_author: Wei Cheng (Wayne) Chiu
site_description: >-
  Personal website of Wei Cheng (Wayne) Chiu — Machine Learning Engineer
  (LLM inference & GPU performance). Experiences, publications, projects, talks, patches, and blog.

nav:
  - About: index.md
  - Experiences: experiences.md
  - Publications: publications.md
  - Projects: projects.md
  - Talks: talks.md
  - Patches: patches.md
  - Blog:
      - blog/index.md
      - Notes — TensorRT-LLM + Triton serving: blog/notes-trtllm-triton-serving.md
      - Tensor-parallel & the NVLink wall: blog/nccl-nvlink-bandwidth.md
      - RAG groundedness (0% vs 50%): blog/rag-groundedness-guardrail.md
      - Notes — Federated Learning + DP: blog/notes-federated-learning-dp.md
      - Notes — CUDA Tensor Core GEMM (WMMA): blog/notes-cuda-tensor-core-gemm.md
      - Meta-Reinforcement Learning: blog/meta-rl.md
      - CUDA Programming 入門: blog/pp-intro.md
      - 滲透測試入門技術: blog/pentest-intro.md

theme:
  name: material
  language: en
  custom_dir: overrides
  font: false
  favicon: assets/favicon.png
  icon:
    logo: material/account-circle
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# bump ?v= on every extra.css change — GitHub Pages caches assets for
# 10 minutes and browsers honor it, so an unversioned URL shows stale CSS
extra_css:
  - stylesheets/extra.css?v=20260719.10

extra_javascript:
  - javascripts/pb-filter.js

extra:
  analytics:
    provider: google
    property: G-CM6KG884P9
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/waynehacking8
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/wei-cheng-chiu/
      name: LinkedIn
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/itswaynechiu
      name: X
    - icon: fontawesome/solid/envelope
      link: mailto:waynehacking8@gmail.com
      name: Email

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

copyright: Copyright &copy; 2025&ndash;PRESENT Wei Cheng (Wayne) Chiu
